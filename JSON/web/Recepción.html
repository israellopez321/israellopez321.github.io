<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>

    <p id="info"></p>

<script>

    // Pedimos la información de un usuario específico
    fetch('https://jsonplaceholder.typicode.com/users/1')
        // Convertimos el texto JSON a Objeto JS
        .then(respuesta => respuesta.json())
        .then(usuario => {
            // Ejercicio: Acceder a propiedades anidadas
            console.log("Nombre del usuario:", usuario.name);
            console.log("Ciudad:", usuario.address.city);
            console.log("Latitud:", usuario.address.geo.lat);

            console.log ("El usuario" + usuario.name + " vive en la calle "+ usuario.address.street + " y su número de telefono es " +
                usuario.phone);

            let info = document.getElementById('info');

            info.textContent = "El usuario " + usuario.name + " vive en la calle "+ usuario.address.street + " y su número de telefono es " +
                usuario.phone;

        })



</script>
</body>
</html>
