<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Ejercicio 4: RETO</title>
    <script src="http://code.jquery.com/jquery-1.10.2.min.js"></script>
</head>
<body>

<h2>Recibir datos para insertarlos en una tabla de Base de Datos MariaDB</h2>

<label for="descripcion">Descripción:</label>
<input type="text"  id="descripcion" placeholder="Ingresa una descripcion...">

<label for="provedor">IdProvedor:</label>
<input type="Number"  id="provedor" placeholder="Ingresa un id provedor...">

<label for="precio">Precio:</label>
<input type="number"  id="precio" placeholder="Ingresa un precio...">

<button id="enviar">Enviar Datos</button>

<script>

$(document).ready(function () {

    $("#enviar").on("click", function () {

        let datos = {

            descripcion: $("#descripcion").val(),
            idProveedor: parseInt($("#provedor").val()),
            precio: parseFloat($("#precio").val())
        }

        enviarDatos(datos);
    })

    function enviarDatos(datos) {
            
            $.ajax({
                url: "https://lm.iesnervion.es/reto4.php",
                method: "POST",
                data: JSON.stringify(datos),
                contentType: "application/json", // Tipo de contenido
                dataType: "json", // La respuesta será interpretada como JSON
                success: function(response) {
                    console.log(response);
                },
                error: function(xhr, status, error) {
                    console.log(`Error: ${xhr.status} - ${error}`);
                }
            });
    }
})
</script>
</body>
</html>
