<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Ejercicio01: Reto con jQuery</title>

    <!-- Cargar jQuery -->

</head>
<body>

<h1>Ejercicio01: RetoJquery</h1>

<label for="nombre">Nombre</label>
<input type="text" id="nombre" placeholder="Introduce tu nombre">

<label for="apellidos">Apellidos</label>
<input type="text" id="apellidos" placeholder="Introduce tus apellidos">

<label for="edad">Edad</label>
<input type="number" id="edad" placeholder="Introduce tu edad">

<label for="ciudad">Ciudad</label>
<input type="text" id="ciudad" placeholder="Introduce tu ciudad">

<button id="iniciar">Añadir</button>

<table border="1" style="margin-top:20px;">
    <thead>
    <tr>
        <th>Nombre</th>
        <th>Apellidos</th>
        <th>Edad</th>
        <th>Ciudad</th>
    </tr>
    </thead>
    <tbody id="bodyTabla"></tbody>
</table>

<h2>Estadísticas de edades</h2>
<div id="estadisticas">
    <p>Suma: <span id="sumaEdad">0</span></p>
    <p>Máximo: <span id="maxEdad">0</span></p>
    <p>Media: <span id="mediaEdad">0</span></p>
    <p>Mínimo: <span id="minEdad">0</span></p>
</div>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script>

    $(document).ready(function () {

    let lista = [];

    let contadorID = 0;

    function serializar(obj) {
        return JSON.stringify(obj);
    }

    function deserializar(json) {
        return JSON.parse(json);
    }

    function insertarTabla(obj) {

        let idFila = "fila_" + contadorID;
        contadorID++;

        $("#bodyTabla").append(`
              <tr id="${idFila}" onclick="eliminarFila('${idFila}', ${contadorID})">
                <td>${obj.nombre}</td>
                <td>${obj.apellidos}</td>
                <td>${obj.edad}</td>
                <td>${obj.ciudad}</td>
            </tr>
        `);

        lista.push(obj.edad);
    }


    $("#iniciar").on("click", function () {

        if ($("#nombre").val().trim() === "") {
            alert("El campo Nombre es obligatorio");
            return;
        }

        if ($("#apellidos").val().trim() === "") {
            alert("El campo Apellidos es obligatorio");
            return;
        }

        if ($("#edad").val().trim() === "") {
            alert("El campo Edad es obligatorio");
            return;
        }

        if ($("#ciudad").val().trim() === "") {
            alert("El campo Ciudad es obligatorio");
            return;
        }

        const objeto = {
            nombre: $("#nombre").val(),
            apellidos: $("#apellidos").val(),
            edad: $("#edad").val(),
            ciudad: $("#ciudad").val()
        };

        const objJSON = serializar(objeto);
        const objObjeto = deserializar(objJSON);

        insertarTabla(objObjeto);

        actualizarEstadisticas();
    });



    function eliminarFila(id, contadorId) {
        $("#" + id).remove();
        lista.splice(contadorId,1);
        actualizarEstadisticas();

    }

    function actualizarEstadisticas() {

        if (lista.length === 0) {
            $("#sumaEdad").text(0);
            $("#maxEdad").text(0);
            $("#mediaEdad").text(0);
            $("#minEdad").text(0);
            return;
        }

        let suma = 0;

        lista.forEach((valor) => {

            parseInt(suma = suma + valor);

        });

        let max = Math.max(...lista);
        let min = Math.min(...lista);
        let media = (suma / lista.length).toFixed(2);

        $("#sumaEdad").text(suma);
        $("#maxEdad").text(max);
        $("#mediaEdad").text(media);
        $("#minEdad").text(min);
    }

    })
</script>

</body>
</html>
