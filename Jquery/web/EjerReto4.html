<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Ejercicio01: Reto con jQuery</title>

    <!-- Cargar jQuery -->

</head>
<body>

<h1>Ejercicio01: RetoJquery</h1>

<p>Hobbies:</p>
<div style="border: 1px solid black;  max-width: 700px"  >
    <input type="checkbox" id="deporte" name="checks" value="deporte">Deporte
    <input type="checkbox" id="lectura" name="checks" value="lectura">Lectura
    <input type="checkbox" id="musica" name="checks" value="música">Música
    <input type="checkbox" id="juegos" name="checks" value="juegos">Juegos
    <input type="checkbox" id="cine" name="checks" value="cine">Cine
    <input type="checkbox" id="teatro" name="checks" value="teatro">Teatro
    <input type="checkbox" id="coleccionismo" name="checks" value="coleccionismo">Coleccionismo
    <input type="checkbox" id="bricolaje" name="checks" value="bricolaje">Bricolaje
    <input type="checkbox" id="cosplay" name="checks" value="cosplay">Cosplay
</div>

<br>

<label for="nombre">Nombre</label>
<input type="text" id="nombre" placeholder="Introduce tu nombre">

<label for="apellidos">Apellidos</label>
<input type="text" id="apellidos" placeholder="Introduce tus apellidos">

<label for="edad">Edad</label>
<input type="number" id="edad" placeholder="Introduce tu edad">

<label for="ciudad">Ciudad</label>
<input type="text" id="ciudad" placeholder="Introduce tu ciudad">

<button id="iniciar">Añadir</button>
<button id="enviar">Enviar</button>

<table border="1" style="margin-top:20px;">
    <thead>
    <tr>
        <th>Nombre</th>
        <th>Apellidos</th>
        <th>Edad</th>
        <th>Ciudad</th>
        <th>Hobbies</th>
    </tr>
    </thead>
    <tbody id="bodyTabla"></tbody>
</table>

<h2>Estadísticas de edades</h2>
<div id="estadisticas">
    <p>Suma: <span id="sumaEdad">0</span></p>
    <p>Máximo: <span id="maxEdad">0</span></p>
    <p>Media: <span id="mediaEdad">0</span></p>
    <p>Mínimo: <span id="minEdad">0</span></p>
</div>


<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script>

    $(document).ready(function () {

        let lista = [];
        let contadorID = 0;

        let datos = [];

        function serializar(obj) {
            return JSON.stringify(obj);
        }

        function deserializar(json) {
            return JSON.parse(json);
        }

        $("#iniciar").on("click", function () {

            if ($("#nombre").val().trim() === "") { alert("El campo Nombre es obligatorio"); return; }
            if ($("#apellidos").val().trim() === "") { alert("El campo Apellidos es obligatorio"); return; }
            if ($("#edad").val().trim() === "") { alert("El campo Edad es obligatorio"); return; }
            if ($("#ciudad").val().trim() === "") { alert("El campo Ciudad es obligatorio"); return; }


            let hobbies = []

            $("[name='checks']:checked").each(function () {
                hobbies.push($(this).val());
            })

            const objeto = {
                nombre: $("#nombre").val(),
                apellidos: $("#apellidos").val(),
                edad: $("#edad").val(),
                ciudad: $("#ciudad").val(),
                hobbies: hobbies
            };

            datos.push(objeto);

            const objJSON = serializar(objeto);
            const objObjeto = deserializar(objJSON);

            insertarTabla(objObjeto);
            actualizarEstadisticas();

            $("#nombre").val("");
            $("#apellidos").val("");
            $("#edad").val("");
            $("#ciudad").val("");

            $("[name='checks']").prop("checked", false).prop("disabled", false);
        });

        $("#enviar").on("click", function () {

            let json = serializar(datos);

            $.ajax({
                url: "https://lm.iesnervion.es/eco.php",
                type: "POST",
                data: json,
                contentType: "application/json",
                success: function (respuesta) {

                    let r = deserializar(respuesta);

                    alert(
                        "Suma: " + r.suma +
                        "\nMedia: " + r.media +
                        "\nMáximo: " + r.max +
                        "\nMínimo: " + r.min
                    );

                    console.log("Lista devuelta:", r.lista);
                }
            });

        });


        function insertarTabla(obj) {

            let idFila = "fila_" + contadorID;

            $("#bodyTabla").append(`
            <tr id="${idFila}" data-edad="${obj.edad}">
                <td>${obj.nombre}</td>
                <td>${obj.apellidos}</td>
                <td>${obj.edad}</td>
                <td>${obj.ciudad}</td>
                <td>${obj.hobbies}</td>
            </tr>
        `);

            // Guardamos la edad como número
            lista.push(parseInt(obj.edad));

            // Evento de eliminar fila
            $("#" + idFila).on("click", function () {
                eliminarFila(idFila);
            });

            contadorID++;
        }



        function eliminarFila(id) {

            let edad = parseInt($("#" + id).attr("data-edad"));

            // Eliminamos SOLO la primera coincidencia
            let index = lista.indexOf(edad);
            if (index !== -1) {
                lista.splice(index, 1);
            }

            $("#" + id).remove();
            actualizarEstadisticas();
        }

        function actualizarEstadisticas() {

            if (lista.length === 0) {
                $("#sumaEdad").text(0);
                $("#maxEdad").text(0);
                $("#mediaEdad").text(0);
                $("#minEdad").text(0);
                return;
            }

            let suma = 0;

            lista.forEach((valor) => {
                suma += valor;
            });

            let max = Math.max(...lista);
            let min = Math.min(...lista);
            let media = (suma / lista.length).toFixed(2);

            $("#sumaEdad").text(suma);
            $("#maxEdad").text(max);
            $("#mediaEdad").text(media);
            $("#minEdad").text(min);
        }

        $("[name='checks']").on("change", function () {

            let marcados = $("[name='checks']:checked");

            if (marcados.length === 3) {
                // Deshabilitar todos los NO marcados
                $("[name='checks']").not(":checked").prop("disabled", true);
            } else {
                // Volver a habilitar todos
                $("[name='checks']").prop("disabled", false);
            }

        });



    });
</script>


</body>
</html>
